name: FragStealers
version: '${version}'
main: me.pinnacle.fragstealers.FragStealers
api-version: '26.2'
author: Kevin
description: Protect chests and barrels with [fs] signs and provide an admin Master Key.

commands:
  fragstealers:
    description: FragStealers administration command.
    usage: /fs give masterkey [player]
    aliases: [fs]
    permission: fragstealers.masterkey.give

permissions:
  fragstealers.masterkey.give:
    description: Allows an administrator to give a FragStealers Master Key.
    default: op
  fragstealers.masterkey.use:
    description: Allows an administrator holding a Master Key to bypass container protection.
    default: op
