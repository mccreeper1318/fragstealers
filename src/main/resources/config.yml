# Ordinary [fs] locks only:
# false prevents hoppers and hopper minecarts from extracting items.
hopper-take-item: false

# true allows hoppers and hopper minecarts to insert items.
hopper-put-item: true

# Enables creation and customer use of [fs shop] shops.
# When disabled, existing shops remain saved and owners/admins can still manage,
# collect payments, and remove them.
fs-shops: true

# Enables creation and deposits for [fs mail] mailboxes.
# When disabled, existing mailbox data remains saved and owners/admins can still
# collect mail and remove mailboxes.
fs-mail: true
